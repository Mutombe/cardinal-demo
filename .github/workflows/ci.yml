name: CI

# Fast feedback on every push/PR: type-check + build both frontends and
# run Django's system checks. Render auto-deploys on push to main separately.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  erp-frontend:
    name: ERP frontend (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: erp/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: erp/frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  public-site:
    name: Public site (build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run build

  backend:
    name: Backend (Django checks)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: erp/backend
    env:
      DJANGO_SETTINGS_MODULE: config.settings.development
      SECRET_KEY: ci-secret-not-used-in-prod
      # Dummy URL — `check` parses but does not connect.
      DATABASE_URL: postgresql://user:pass@localhost:5432/ci
      DB_SCHEMA: public
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Django system checks
        run: python manage.py check
